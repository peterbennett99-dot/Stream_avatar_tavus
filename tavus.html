<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tavus Dev Console</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg:        #0a0a0f;
        --surface:   #13131a;
        --surface2:  #1c1c28;
        --border:    #2a2a3a;
        --accent:    #818cf8;
        --accent-bg: rgba(129,140,248,0.10);
        --green:     #22c55e;
        --red:       #ef4444;
        --amber:     #f59e0b;
        --text:      #e2e2f0;
        --muted:     #6b7280;
        --radius:    8px;
      }

      body {
        font-family: system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
      }

      /* ── Header ── */
      header {
        padding: 0.75rem 1.5rem;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 1rem;
        background: var(--surface);
        flex-wrap: wrap;
      }
      header h1 {
        font-size: 1rem;
        font-weight: 700;
        color: var(--accent);
        letter-spacing: 0.05em;
        white-space: nowrap;
      }
      #api-key-wrap {
        display: flex;
        gap: 0.5rem;
        flex: 1;
        max-width: 520px;
      }
      #api-key-input {
        flex: 1;
        padding: 0.45rem 0.75rem;
        border-radius: var(--radius);
        border: 1px solid var(--border);
        background: var(--surface2);
        color: var(--text);
        font-size: 0.85rem;
        outline: none;
      }
      #api-key-input:focus { border-color: var(--accent); }
      #btn-load {
        padding: 0.45rem 1rem;
        border-radius: var(--radius);
        border: none;
        background: var(--accent);
        color: #fff;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        white-space: nowrap;
      }
      #btn-load:disabled { opacity: 0.4; cursor: not-allowed; }
      #api-status {
        font-size: 0.75rem;
        color: var(--muted);
        white-space: nowrap;
      }
      #api-status.ok    { color: var(--green); }
      #api-status.error { color: var(--red); }

      /* ── Layout ── */
      .workspace {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        grid-template-rows: 1fr auto;
        gap: 1px;
        flex: 1;
        background: var(--border);
        overflow: hidden;
        min-height: 0;
      }

      /* ── Panel ── */
      .panel {
        background: var(--bg);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .panel-header {
        padding: 0.75rem 1rem;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
      }
      .panel-title {
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .panel-body {
        flex: 1;
        overflow-y: auto;
        padding: 0.75rem;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      /* ── Cards ── */
      .card {
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 0.65rem 0.85rem;
        background: var(--surface);
        cursor: pointer;
        transition: border-color 0.15s, background 0.15s;
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
      }
      .card:hover { border-color: #444; }
      .card.selected {
        border-color: var(--accent);
        background: var(--accent-bg);
      }
      .card-name {
        font-size: 0.875rem;
        font-weight: 600;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .card-id {
        font-size: 0.7rem;
        color: var(--muted);
        font-family: monospace;
      }
      .card-meta {
        font-size: 0.72rem;
        color: var(--muted);
      }
      .card-badges {
        display: flex;
        flex-wrap: wrap;
        gap: 0.3rem;
        margin-top: 0.15rem;
      }
      .badge {
        font-size: 0.65rem;
        padding: 0.15rem 0.45rem;
        border-radius: 20px;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .badge-green  { background: rgba(34,197,94,0.15);  color: var(--green); }
      .badge-amber  { background: rgba(245,158,11,0.15); color: var(--amber); }
      .badge-accent { background: var(--accent-bg);      color: var(--accent); }
      .badge-muted  { background: var(--surface2);       color: var(--muted); }

      /* ── Doc panel extras ── */
      .doc-add-row {
        display: flex;
        gap: 0.4rem;
        margin-bottom: 0.25rem;
      }
      .doc-add-row input {
        flex: 1;
        padding: 0.45rem 0.7rem;
        border-radius: var(--radius);
        border: 1px solid var(--border);
        background: var(--surface2);
        color: var(--text);
        font-size: 0.82rem;
        outline: none;
      }
      .doc-add-row input:focus { border-color: var(--accent); }
      .doc-add-row input::placeholder { color: var(--muted); }

      .doc-card { cursor: default; }
      .doc-card .attach-row {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        margin-top: 0.35rem;
      }
      .doc-card .attach-row select {
        flex: 1;
        padding: 0.3rem 0.5rem;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--surface2);
        color: var(--text);
        font-size: 0.75rem;
        outline: none;
      }

      /* ── Buttons ── */
      .btn {
        padding: 0.4rem 0.85rem;
        border-radius: var(--radius);
        border: none;
        cursor: pointer;
        font-size: 0.8rem;
        font-weight: 600;
        transition: opacity 0.15s;
        white-space: nowrap;
      }
      .btn:disabled { opacity: 0.35; cursor: not-allowed; }
      .btn-accent  { background: var(--accent); color: #fff; }
      .btn-green   { background: var(--green);  color: #000; }
      .btn-red     { background: var(--red);    color: #fff; }
      .btn-ghost   { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

      /* ── Launch bar ── */
      #launch-bar {
        grid-column: 1 / -1;
        background: var(--surface);
        border-top: 1px solid var(--border);
        padding: 0.75rem 1.25rem;
        display: flex;
        align-items: center;
        gap: 1rem;
        flex-wrap: wrap;
      }
      .selection-chip {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.35rem 0.75rem;
        border-radius: 20px;
        border: 1px solid var(--border);
        background: var(--surface2);
        font-size: 0.78rem;
      }
      .selection-chip .chip-label { color: var(--muted); }
      .selection-chip .chip-val   { color: var(--accent); font-weight: 600; font-family: monospace; }
      .selection-chip .chip-val.none { color: var(--muted); font-style: italic; font-family: inherit; font-weight: normal; }

      #conv-name-input {
        padding: 0.4rem 0.7rem;
        border-radius: var(--radius);
        border: 1px solid var(--border);
        background: var(--surface2);
        color: var(--text);
        font-size: 0.82rem;
        outline: none;
        width: 180px;
      }
      #conv-name-input:focus { border-color: var(--accent); }
      #conv-name-input::placeholder { color: var(--muted); }

      #btn-launch { padding: 0.45rem 1.25rem; font-size: 0.875rem; }
      #btn-end    { padding: 0.45rem 1.25rem; font-size: 0.875rem; display: none; }

      /* ── Conversation overlay ── */
      #conv-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.85);
        z-index: 100;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
      }
      #conv-overlay.visible { display: flex; }
      #conv-overlay-header {
        display: flex;
        align-items: center;
        gap: 1rem;
        width: 100%;
        max-width: 900px;
        padding: 0 0.5rem;
      }
      #conv-overlay-title {
        flex: 1;
        font-size: 0.85rem;
        color: var(--muted);
        font-family: monospace;
      }
      #conv-frame {
        width: 100%;
        max-width: 900px;
        aspect-ratio: 16/9;
        border-radius: 12px;
        border: 1px solid var(--border);
      }

      /* ── Empty / loading states ── */
      .empty {
        padding: 2rem 1rem;
        text-align: center;
        color: var(--muted);
        font-size: 0.8rem;
        line-height: 1.6;
      }
      .spinner {
        display: inline-block;
        width: 14px; height: 14px;
        border: 2px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        vertical-align: middle;
        margin-right: 0.4rem;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* ── Toast ── */
      #toast {
        position: fixed;
        bottom: 1.5rem;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 0.6rem 1.1rem;
        font-size: 0.82rem;
        color: var(--text);
        z-index: 200;
        transition: transform 0.25s ease;
        max-width: min(480px, 90vw);
        white-space: normal;
        text-align: center;
        line-height: 1.4;
      }
      #toast.show { transform: translateX(-50%) translateY(0); }
      #toast.ok    { border-color: var(--green); color: var(--green); }
      #toast.error { border-color: var(--red);   color: var(--red);   }
    </style>
  </head>
  <body>

    <!-- Header -->
    <header>
      <h1>TAVUS DEV CONSOLE</h1>
      <div id="api-key-wrap">
        <input id="api-key-input" type="password" placeholder="Tavus API key from platform.tavus.io" />
        <button id="btn-load" class="btn btn-accent">Load</button>
      </div>
      <span id="api-status">Not connected</span>
    </header>

    <!-- Workspace -->
    <div class="workspace">

      <!-- Replicas panel -->
      <div class="panel" id="panel-replicas">
        <div class="panel-header">
          <span class="panel-title">Replicas</span>
          <button class="btn btn-ghost" id="btn-refresh-replicas" disabled>Refresh</button>
        </div>
        <div class="panel-body" id="replicas-body">
          <div class="empty">Load your API key to list replicas.</div>
        </div>
      </div>

      <!-- Personas panel -->
      <div class="panel" id="panel-personas">
        <div class="panel-header">
          <span class="panel-title">Personas</span>
          <div style="display:flex;gap:0.4rem;">
            <button class="btn btn-accent" id="btn-new-persona" disabled>+ New</button>
            <button class="btn btn-ghost"  id="btn-refresh-personas" disabled>Refresh</button>
          </div>
        </div>
        <!-- Create persona form (hidden by default) -->
        <div id="create-persona-form" style="display:none;padding:0.75rem;border-bottom:1px solid var(--border);background:var(--surface);flex-direction:column;gap:0.5rem;">
          <input id="new-persona-name"   type="text"     placeholder="Persona name *" style="padding:0.45rem 0.7rem;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:0.82rem;outline:none;" />
          <textarea id="new-persona-prompt" placeholder="System prompt (optional)" rows="3" style="padding:0.45rem 0.7rem;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:0.82rem;outline:none;resize:vertical;font-family:inherit;"></textarea>
          <div style="display:flex;gap:0.4rem;">
            <button class="btn btn-green" id="btn-create-persona" style="flex:1;">Create Persona</button>
            <button class="btn btn-ghost" id="btn-cancel-persona">Cancel</button>
          </div>
        </div>
        <div class="panel-body" id="personas-body">
          <div class="empty">Load your API key to list personas.</div>
        </div>
      </div>

      <!-- Knowledge Base panel -->
      <div class="panel" id="panel-docs">
        <div class="panel-header">
          <span class="panel-title">Knowledge Base</span>
          <button class="btn btn-ghost" id="btn-refresh-docs" disabled>Refresh</button>
        </div>
        <div class="panel-body" id="docs-body">
          <div class="empty">Load your API key to manage documents.</div>
        </div>
      </div>

      <!-- Launch bar -->
      <div id="launch-bar">
        <div class="selection-chip">
          <span class="chip-label">Replica</span>
          <span class="chip-val none" id="chip-replica">none selected</span>
        </div>
        <div class="selection-chip">
          <span class="chip-label">Persona</span>
          <span class="chip-val none" id="chip-persona">none selected</span>
        </div>
        <input id="conv-name-input" type="text" placeholder="Conversation name (optional)" />
        <button class="btn btn-green" id="btn-launch" disabled>▶ Start Conversation</button>
        <button class="btn btn-red"   id="btn-end">■ End Conversation</button>
      </div>

    </div><!-- /workspace -->

    <!-- Conversation overlay -->
    <div id="conv-overlay">
      <div id="conv-overlay-header">
        <span id="conv-overlay-title">conversation_id: —</span>
        <button class="btn btn-red" id="btn-end-overlay">■ End &amp; Close</button>
      </div>
      <iframe
        id="conv-frame"
        allow="camera; microphone; display-capture; autoplay"
        src=""
      ></iframe>
    </div>

    <!-- Toast -->
    <div id="toast"></div>

    <script type="module" src="/src/tavus.ts"></script>
  </body>
</html>
